<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MumlyCare Certification Exam</title>

<style>
body { font-family: Arial; margin:40px; }

#timer { color:red; font-size:20px; }

.watermark {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%) rotate(-45deg);
  opacity:0.15;
  z-index:-1;
  width:400px;
}
</style>
</head>

<body>

<h2>MumlyCare Certification Exam</h2>

<p id="timer">Time Left: 10:00</p>

<label>Candidate Name:</label>
<input type="text" id="name"><br><br>

<div id="questions"></div>

<button onclick="submitExam()">Submit</button>

<p id="result"></p>

<script>

// ✅ YOUR BACKEND URL
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwQXV64cNdi4rn9TcUgSz3QGYdJMbCMWJWp78Dsu_-7Z8O3vBEI5T2a5BZY5p3HejeK/exec";

// ✅ LOAD AFTER PAGE READY
document.addEventListener("DOMContentLoaded", function(){

const questions = [
  {q:"Primary responsibility of caregiver?",
   o:["Admin meds","Ensure safety","Surgery","Finance"], a:1},

  {q:"Report elder abuse to?",
   o:["Private","Supervisor","Friends","Self"], a:1},

  {q:"Normal SpO2?",
   o:["<85","85-90","95-100",">100"], a:2},

  {q:"Reposition frequency?",
   o:["Daily","4-6 hours","Every 2 hours","On request"], a:2},

  {q:"Chest pain action?",
   o:["Water","Rest","Emergency call","Ignore"], a:2}
];

// ✅ RENDER QUESTIONS
let qBox = document.getElementById("questions");

questions.forEach((q,i)=>{
  let block = `<p><b>${i+1}. ${q.q}</b></p>`;

  q.o.forEach((opt,index)=>{
    block += `<input type="radio" name="q${i}" value="${index}"> ${opt}<br>`;
  });

  qBox.insertAdjacentHTML("beforeend", block + "<br>");
});

// ✅ TIMER
let time = 600;
setInterval(()=>{
  time--;
  let min = Math.floor(time/60);
  let sec = time%60;

  document.getElementById("timer").innerText =
    "Time Left: " + min + ":" + (sec<10?"0":"")+sec;
},1000);

// ✅ SUBMIT FUNCTION
window.submitExam = async function(){

  let name = document.getElementById("name").value;

  if(!name){
    alert("Enter name");
    return;
  }

  let score = 0;

  questions.forEach((q,i)=>{
    let ans = document.querySelector(`input[name=q${i}]:checked`);
    if(ans && parseInt(ans.value) === q.a){
      score++;
    }
  });

  let percent = (score / questions.length) * 100;
  let status = percent >= 70 ? "PASS" : "FAIL";

  // ✅ SHOW RESULT
