<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MumlyCare Certification Exam</title>

<style>
body {
  font-family: Arial;
  margin: 40px;

  background:
    linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
    url("mumlycare-logo-text-Be61iYWR.png");

  background-repeat: no-repeat;
  background-position: center;
  background-size: 420px;
}

h2 {
  text-align: center;
  color: maroon;
}

#timer {
  color: red;
  font-size: 20px;
}

.question {
  margin-bottom: 20px;
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 6px;
  background-color: rgba(255,255,255,0.95);
}

button {
  margin-top: 20px;
  padding: 10px 25px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
}

#result {
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>MumlyCare Certification Exam</h2>

<p id="timer">Time Left: 10:00</p>

<label><b>Candidate Name:</b></label><br>
<input type="text" id="name"><br><br>

<div id="questions"></div>

<button onclick="submitExam()">Submit Exam</button>

<p id="result"></p>

<script>

// ✅ YOUR FINAL WORKING URL (KEEP THIS EXACT)
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwUUxEZuaJP-yhi6NqZmF2qRUmplInBJf8aJ_fI1R9urZQnpMkcUUIjd8Dy7FkzVbwBEw/exec";

let questions = [];


// ✅ ✅ FINAL FIXED QUESTION LOADER
function loadQuestions() {
  fetch(WEB_APP_URL)
    .then(response => response.text())
    .then(text => {
      try {
        const data = JSON.parse(text);

        if (!Array.isArray(data)) {
          console.error("Invalid response:", data);
          return;
        }

        questions = data;
        renderQuestions();

      } catch (err) {
        console.error("Parse error:", text);
        alert("❌ Failed to load questions");
      }
    })
    .catch(err => {
      console.error("Fetch error:", err);
      alert("❌ Failed to load questions");
    });
}


// ✅ RENDER QUESTIONS
function renderQuestions() {
  let box = document.getElementById("questions");
  box.innerHTML = "";

  questions.forEach((q, i) => {
    let html = `<div class="question"><b>${i+1}. ${q.q}</b><br><br>`;

    q.o.forEach((opt, j) => {
      html += `<input type="radio" name="q${i}" value="${j}"> ${opt}<br>`;
    });

    html += "</div>";

    box.innerHTML += html;
  });
}


// ✅ TIMER
let time = 600;
let timer = setInterval(() => {

  if (time <= 0) {
    clearInterval(timer);
    alert("Time up!");
    submitExam();
    return;
  }

  time--;

  let m = Math.floor(time / 60);
  let s = time % 60;

  document.getElementById("timer").innerText =
    `Time Left: ${("0"+m).slice(-2)}:${("0"+s).slice(-2)}`;

}, 1000);


// ✅ ✅ FINAL SUBMIT (WORKING)
function submitExam() {

  clearInterval(timer);

  let name = document.getElementById("name").value.trim();

  if (!name) {
    alert("Enter name");
    return;
  }

  let score = 0;

  for (let i = 0; i < questions.length; i++) {
    let ans = document.querySelector(`input[name="q${i}"]:checked`);

    if (ans && parseInt(ans.value) === questions[i].a) {
      score++;
    }
  }

  let percent = Math.round((score / questions.length) * 100);
  let status = percent >= 70 ? "PASS" : "FAIL";

  document.getElementById("result").innerHTML = "Submitting...";

  // ✅ SEND DATA (GET METHOD)
  let url = WEB_APP_URL +
    "?name=" + encodeURIComponent(name) +
    "&score=" + percent +
    "&status=" + status;

  fetch(url)
    .then(() => {
      document.getElementById("result").innerHTML =
        "✅ Thank you for completing the MumlyCare Certification Assessment.<br><br>MumlyCare Admin team will get back to you.";
    })
    .catch(() => {
      alert("❌ Error saving result");
    });
}


// ✅ START
loadQuestions();

</script>

</body>
</html>
