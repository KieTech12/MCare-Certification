<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MumlyCare Certification Exam</title>

<style>
body {
  font-family: Arial;
  margin: 40px;

  /* ✅ SAFE BACKGROUND IMAGE */
  background:
    linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
    url("mumlycare-logo-text-Be61iYWR.png");

  background-repeat: no-repeat;
  background-position: center;
  background-size: 420px;
}

h2 {
  text-align: center;
  color: maroon;
}

#timer {
  color: red;
  font-size: 20px;
}

.question {
  margin-bottom: 20px;
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 6px;
  background-color: rgba(255,255,255,0.95);
}

button {
  margin-top: 20px;
  padding: 10px 30px;
  font-size: 16px;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background-color: #45a049;
}

button:disabled {
  background-color: grey;
}

#result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>MumlyCare Certification Exam</h2>

<p id="timer">Time Left: 10:00</p>

<label><b>Candidate Name:</b></label><br>
<input type="text" id="name"
placeholder="Enter your full name"
style="padding:8px; width:300px; margin-top:6px;"><br><br>

<div id="questions"></div>

<button id="submitBtn" onclick="submitExam()">Submit Exam</button>

<p id="result"></p>

<script>

// ✅ YOUR LIVE BACKEND (UPDATED)
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxtdhdQfL_P64WPQ5hcOC5Oh6pt1K9qXhyk7c9m8Anz1vezC095aaac8NLP1qZKOJJ/exec";

// ✅ QUESTIONS ARRAY (DYNAMIC)
let questions = [];

// ✅ LOAD QUESTIONS FROM GOOGLE SHEET
function loadQuestions() {

  fetch(WEB_APP_URL)
    .then(res => res.json())
    .then(data => {

      questions = data;

      renderQuestions();
    })
    .catch(err => {
      console.error(err);
      alert("❌ Failed to load questions");
    });
}


// ✅ RENDER QUESTIONS
function renderQuestions() {
  let qBox = document.getElementById("questions");
  qBox.innerHTML = "";

  questions.forEach(function(q, i) {
    let html = `<div class="question"><p><b>${i + 1}. ${q.q}</b></p>`;

    for (let j = 0; j < q.o.length; j++) {
      html += `<input type="radio" name="q${i}" value="${j}"> ${q.o[j]}<br>`;
    }

    html += `</div>`;

    qBox.innerHTML += html;
  });
}

// ✅ LOAD ON PAGE START
loadQuestions();


// ✅ TIMER
let time = 600;
let timerInterval = setInterval(function() {

  if (time <= 0) {
    clearInterval(timerInterval);
    alert("⏰ Time's up! Auto submitting...");
    submitExam();
    return;
  }

  time--;

  let min = Math.floor(time / 60);
  let sec = time % 60;

  document.getElementById("timer").innerText =
    `Time Left: ${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

}, 1000);


// ✅ PREVENT DOUBLE SUBMIT
let submitted = false;


// ✅ SUBMIT FUNCTION
function submitExam() {

  if (submitted) return;
  submitted = true;

  clearInterval(timerInterval);

  let btn = document.getElementById("submitBtn");
  btn.disabled = true;

  let name = document.getElementById("name").value.trim();

  if (!name) {
    alert("⚠️ Please enter your name.");
    submitted = false;
    btn.disabled = false;
    return;
  }

  let score = 0;

  for (let i = 0; i < questions.length; i++) {
    let ans = document.querySelector(`input[name="q${i}"]:checked`);
    if (ans && parseInt(ans.value) === questions[i].a) {
      score++;
    }
  }

  let percent = ((score / questions.length) * 100).toFixed(0);
  let status = percent >= 70 ? "PASS" : "FAIL";

  document.getElementById("result").innerHTML = "⏳ Submitting...";

  // ✅ SEND RESULT
  fetch(WEB_APP_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body:
      `name=${encodeURIComponent(name)}&score=${percent}&status=${status}`
  })
  .then(() => {

    // ✅ FINAL MESSAGE (NO SCORE SHOWN)
    document.getElementById("result").innerHTML =
      `✅ Thank you for completing the MumlyCare Certification Assessment.<br><br>
       MumlyCare Admin team will get back to you.`;

  })
  .catch(() => {
    alert("❌ ERROR sending data");
  });
}

</script>

</body>
</html>
