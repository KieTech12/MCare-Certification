<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MumlyCare Certification Exam</title>

<style>
body { font-family: Arial; margin:40px; }

/* DIAGONAL WATERMARK LOGO */
.watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-45deg);
  opacity: 0.15;
  z-index: -1;
  width: 600px;
}

#timer { font-size:20px; color:red; }
</style>
</head>

<body>

<!-- YOUR LOGO WITH DIAGONAL STYLE -->
<img src="mumlycare-logo-text-Be61iYWR.png" class="watermark">

<h2>MumlyCare Certification Exam</h2>

<p id="timer">Time Left: 10:00</p>

<label>Candidate Name:</label>
<input type="text" id="name"><br><br>

<div id="questions"></div>

<button onclick="submitExam()">Submit</button>

<p id="result"></p>

<script>

// TIMER
let time = 600;
let timer = setInterval(()=>{
  time--;
  let min = Math.floor(time/60);
  let sec = time%60;
  document.getElementById("timer").innerText =
    "Time Left: " + min + ":" + (sec<10?"0":"")+sec;

  if(time <= 0){
    clearInterval(timer);
    submitExam();
  }
},1000);

// TAB SWITCH WARNING
document.addEventListener("visibilitychange", function() {
  if(document.hidden){
    alert("Warning: Tab switching detected!");
  }
});

// QUESTIONS
const questions = [
  {q:"Primary responsibility of caregiver?", o:["Admin meds","Ensure safety","Surgery","Finance"], a:1},
  {q:"Report elder abuse to?", o:["Private","Supervisor","Friends","Self"], a:1},
  {q:"Normal SpO2?", o:["<85","85-90","95-100",">100"], a:2},
  {q:"Reposition bedridden?", o:["Daily","4-6h","2h","Request"], a:2},
  {q:"Chest pain action?", o:["Water","Rest","Emergency","Ignore"], a:2}
];

// RANDOMIZE
questions.sort(()=>Math.random()-0.5);

let qBox = document.getElementById("questions");

questions.forEach((q,i)=>{
  let opts = q.o.map((o,index)=>({o,index}))
                .sort(()=>Math.random()-0.5);

  let html = `<p>${i+1}. ${q.q}</p>`;
  opts.forEach(opt=>{
    html += `<input type='radio' name='q${i}' value='${opt.index}'> ${opt.o}<br>`;
  });
  qBox.innerHTML += html;
});

function submitExam(){

  let name = document.getElementById("name").value;
  if(!name){ alert("Enter name"); return; }

  let score = 0;

  questions.forEach((q,i)=>{
    let ans = document.querySelector(`input[name=q${i}]:checked`);
    if(ans && parseInt(ans.value) === q.a) score++;
  });
