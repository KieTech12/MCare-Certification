<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MumlyCare Certification Exam</title>

<style>
body { font-family: Arial; margin:40px; }
#timer { color:red; font-size:20px; }
</style>
</head>

<body>

<h2>MumlyCare Certification Exam</h2>

<p id="timer">Time Left: 10:00</p>

<label>Candidate Name:</label>
<input type="text" id="name"><br><br>

<div id="questions"></div>

<button onclick="submitExam()">Submit</button>

<p id="result"></p>

<script>

// ✅ YOUR BACKEND URL
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwQXV64cNdi4rn9TcUgSz3QGYdJMbCMWJWp78Dsu_-7Z8O3vBEI5T2a5BZY5p3HejeK/exec";

// ✅ QUESTIONS (KEEP SIMPLE & STABLE)
const questions = [
  {q:"Primary responsibility of caregiver?", o:["Admin meds","Ensure safety","Surgery","Finance"], a:1},
  {q:"Report elder abuse to?", o:["Private","Supervisor","Friends","Self"], a:1},
  {q:"Normal SpO2?", o:["<85","85-90","95-100",">100"], a:2},
  {q:"Reposition frequency?", o:["Daily","4-6 hours","Every 2 hours","On request"], a:2},
  {q:"Chest pain action?", o:["Water","Rest","Emergency call","Ignore"], a:2}
];

// ✅ RENDER QUESTIONS (VERY SIMPLE - NO FAILURES)
function renderQuestions() {
  const qBox = document.getElementById("questions");
  qBox.innerHTML = "";

  questions.forEach((q,i)=>{
    let html = `<p><b>${i+1}. ${q.q}</b></p>`;

    q.o.forEach((opt,index)=>{
      html += `<input type="radio" name="q${i}" value="${index}"> ${opt}<br>`;
    });

    qBox.innerHTML += html + "<br>";
  });
}

// ✅ RUN IMMEDIATELY (no timing issues)
renderQuestions();

// ✅ TIMER
let time = 600;
setInterval(()=>{
  time--;
  let min = Math.floor(time/60);
  let sec = time%60;
  document.getElementById("timer").innerText =
    "Time Left: " + min + ":" + (sec<10?"0":"")+sec;
},1000);

// ✅ SUBMIT
async function submitExam(){

  let name = document.getElementById("name").value;

  if(!name){
    alert("Enter name");
    return;
  }

  let score = 0;

  questions.forEach((q,i)=>{
    let ans = document.querySelector(`input[name=q${i}]:checked`);
    if(ans && parseInt(ans.value) === q.a){
      score++;
    }
  });

  let percent = (score / questions.length) * 100;
  let status = percent >= 70 ? "PASS" : "FAIL";

  document.getElementById("result").innerHTML =
    `${name} | Score: ${percent}% | ${status}`;

  try {
    const formData = new URLSearchParams();
    formData.append("name", name);
    formData.append("score", percent);
    formData.append("status", status);

    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: formData
    });

    const txt = await res.text();
    console.log("Response:", txt);

    alert("✅ Result submitted successfully");

  } catch(e){
    console.error(e);
    alert("❌ Failed to submit result");
  }
}

</script>

</body>
</html>
