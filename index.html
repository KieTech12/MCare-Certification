<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MumlyCare Certification Exam</title>

<style>
body {
  font-family: Arial;
  margin: 40px;
  position: relative;
}

/* ✅ SAFE WATERMARK LAYER */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 450px;
  height: 450px;

  background-image: url("https://kietech12.github.io/mumlycare-logo-text-Be61iYWR.png");
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;

  opacity: 0.15;
  transform: translate(-50%, -50%) rotate(-30deg);

  pointer-events: none;
  z-index: -1; /* ✅ ensures it stays behind */
}

#timer {
  color: red;
  font-size: 20px;
}

.question {
  margin-bottom: 20px;
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 6px;
  background-color: #fff;
}

button {
  margin-top: 20px;
  padding: 10px 30px;
  font-size: 16px;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background-color: #45a049;
}
