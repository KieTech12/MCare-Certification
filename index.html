<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MumlyCare Certification Exam</title>

<style>
body { font-family: Arial; margin:40px; }

/* ✅ DIAGONAL WATERMARK */
.watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-45deg);
  opacity: 0.15;
  z-index: -1;
  width: 600px;
}

#timer { font-size:20px; color:red; }
</style>
</head>

<body>

<!-- ✅ CORRECT LOGO -->
mumlycare-logo-text-Be61iYWR.png

<h2>MumlyCare Certification Exam</h2>

<p id="timer">Time Left: 10:00</p>

<label>Candidate Name:</label>
<input type="text" id="name"><br><br>

<div id="questions"></div>

<button onclick="submitExam()">Submit</button>

<p id="result"></p>

<script>

// ✅ TIMER
let time = 600;
let timer = setInterval(()=>{
  time--;

  let min = Math.floor(time / 60);
  let sec = time % 60;

  document.getElementById("timer").innerText =
    "Time Left: " + min + ":" + (sec < 10 ? "0" : "") + sec;

  if (time <= 0) {
    clearInterval(timer);
    submitExam();
  }
}, 1000);

// ✅ TAB SWITCH WARNING
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    alert("Warning: Tab switching detected!");
  }
});

// ✅ QUESTIONS (SAFE + VERIFIED)
const questions = [
  {q:"What is the primary responsibility of a home-based caregiver?",
   o:["Administer medications independently",
     "Ensure safety, comfort, and well-being",
     "Perform surgery",
     "Manage finances"], a:1},

  {q:"A caregiver should report suspected elder abuse to:",
   o:["Keep it private",
     "Supervisor or care platform",
     "Friends",
     "Handle personally"], a:1},

  {q:"Normal oxygen saturation (SpO2) is:",
   o:["Below 85%","85–90%","95–100%","Above 100%"], a:2},

  {q:"How often should a bedridden patient be repositioned?",
   o:["Once daily","4–6 hours","Every 2 hours","Only when asked"], a:2},

  {q:"What should you do if patient has chest pain?",
   o:["Give water","Let rest","Call emergency services","Ignore"], a:2}
];

// ✅ RANDOMIZE QUESTIONS
questions.sort(() => Math.random() - 0.5);

// ✅ RENDER QUESTIONS (CRITICAL PART)
function renderQuestions(){
  let qBox = document.getElementById("questions");
  qBox.innerHTML = "";

  questions.forEach((q, i) => {

    let html = `<p><b>${i+1}. ${q.q}</b></p>`;

    let options = q.o.map((o,index)=>({o,index}))
                     .sort(()=>Math.random()-0.5);

    options.forEach(opt=>{
      html += `<input type="radio" name="q${i}" value="${opt.index}">
               ${opt.o}<br>`;
    });

    qBox.innerHTML += html + "<br>";
  });
}

// ✅ CALL RENDER (IMPORTANT)
renderQuestions();

// ✅ SUBMIT FUNCTION
function submitExam(){

  let name = document.getElementById("name").value;

  if(!name){
    alert("Please enter candidate name");
    return;
  }

  let score = 0;

  questions.forEach((q, i)=>{
    let selected = document.querySelector(`input[name="q${i}"]:checked`);

    if(selected && parseInt(selected.value) === q.a){
      score++;
    }
  });

  let percent = (score / questions.length) * 100;
  let status = percent >= 70 ? "PASS ✅" : "FAIL ❌";

  document.getElementById("result").innerHTML =
    `<br><b>${name}</b><br>
     Score: ${percent}%<br>
     Result: ${status}`;
}

</script>

</body>
</html>
